<html lang="es">
  <head>

    <title>Ejercicio 6 — Mostrar / Ocultar</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
      }

      .oculto {
        display: none;
      }

      .tarjeta {
        background: #f0f0f0;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      }

      button {

        cursor: pointer;

      <p>Este contenido puede mostrarse u ocultarse con el boton.</p>

    <button id="btnToggle">Ocultar</button>

    <script src="ej6.js"></script>
