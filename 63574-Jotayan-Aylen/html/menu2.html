<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <button class="nb" onclick="location.href='index.html'" style="margin:1rem 0">⬅ Volver al índice</button>
  <!-- EJ 2 -->
  <div class="card">
    <div class="card-title"><span class="ej-badge">2</span> Semáforo de colores <span class="nivel muy-facil">Muy Fácil</span><span class="solved-tag">✅ Resuelto</span></div>
    <p>Tres botones cambian el color de un cuadrado.</p>
    <div class="widget">
      <div class="demo-label">Demo interactiva</div>
      <div class="color-box" id="cuadrado-demo"></div>
      <button onclick="document.getElementById('cuadrado-demo').style.backgroundColor='red'" style="background:#ef4444">Rojo</button>
      <button onclick="document.getElementById('cuadrado-demo').style.backgroundColor='gold'" style="background:#ca8a04">Amarillo</button>
      <button onclick="document.getElementById('cuadrado-demo').style.backgroundColor='green'" style="background:#16a34a">Verde</button>
    </div>
  </div>
  <script src="../js/02.js"></script>
</body>
</html>
