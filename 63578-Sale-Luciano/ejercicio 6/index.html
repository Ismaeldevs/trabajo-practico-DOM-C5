<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alternar Contenido</title>
    <style>
        .oculto { 
            display: none; 
        }
        .tarjeta { 
            background: #f0f0f0; 
            padding: 16px;
            border-radius: 8px; 
            margin-bottom: 12px; 
        }
    </style>
</head>
<body>

    <div class="tarjeta" id="tarjeta">
        <h3>Información importante</h3>
        <p>Este contenido puede mostrarse u ocultarse con el botón.</p>
    </div>

    <button id="btnToggle">Ocultar</button>

    <script src="script.js"></script>
</body>
</html>
