<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Practico DOM</title>
  </head>
  <body>

    <!-- Ejercicio 1 -->
    <h1 id="titulo">Esperando cambio...</h1>
    <button id="btnCambiar">Cambiar titulo</button>

    <hr>

    <!-- Ejercicio 2 -->
    <div id="cuadrado" style="width:120px; height:120px; background:gray; border-radius:8px; margin-bottom:12px;"></div>
    <button id="btnRojo">Rojo</button>
    <button id="btnAmarillo">Amarillo</button>
    <button id="btnVerde">Verde</button>

    <hr>

    <!-- Ejercicio 3 -->
    <h2>Iniciar sesion</h2>
    <p>Usuario</p>
    <input type="text" id="usuario" placeholder="Tu usuario" />
    <p>Contrasenia</p>
    <input type="password" id="contrasena" placeholder="Tu contrasenia" />
    <button id="btnLogin">Ingresar</button>
    <p id="mensaje" style="font-weight:bold;"></p>

    <hr>

    <!-- Ejercicio 4 -->
    <label>Tu nombre:</label>
    <input type="text" id="inputNombreEj4" placeholder="Escribi aqui..." />
    <p id="preview">Escribi tu nombre arriba.</p>

    <hr>

    <!-- Ejercicio 5 -->
    <h2>Lista de invitados</h2>
    <input type="text" id="inputNombre" placeholder="Nombre del invitado" />
    <button id="btnAgregar">Agregar</button>
    <p id="aviso" style="color:red;"></p>
    <ul id="listaInvitados"></ul>

    <hr>

    <!-- Ejercicio 6 -->
    <div class="tarjeta" id="tarjeta">
      <h3>Informacion importante</h3>
      <p>Este contenido puede mostrarse u ocultarse con el boton.</p>
    </div>
    <button id="btnToggle">Ocultar</button>

    <hr>

    <!-- Ejercicio 7 -->
    <h2>Crear perfil</h2>
    <input type="text" id="inpNombre" placeholder="Nombre" /><br />
    <input type="text" id="inpProfesion" placeholder="Profesion" /><br />
    <input type="color" id="inpColor" value="#3b82f6" /><br />
    <button id="btnGenerar">Generar tarjeta</button>
    <p id="avisoP" style="color:red;"></p>
    <div id="resultados"></div>

    
  </body>
</html>
